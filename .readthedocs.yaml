# Read the Docs build configuration.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  # Graphviz is only needed to regenerate the diagram PNGs, which are committed
  # under docs/imgs/, so the build itself does not require it.

sphinx:
  configuration: docs/conf.py
  fail_on_warning: true

# This package is Emacs Lisp, not Python, so nothing is pip-installed except the
# Sphinx build dependencies. There is no autodoc and no package import.
python:
  install:
    - requirements: docs/requirements.txt

formats:
  - pdf
  - epub
